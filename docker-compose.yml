services:
  mysql:
    image: mysql:8.0
    container_name: vacc_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?DB_ROOT_PASSWORD must be set}
      MYSQL_DATABASE: ${DB_NAME:-vaccination_db}
      MYSQL_USER: ${DB_USERNAME:?DB_USERNAME must be set}
      MYSQL_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}
    expose:
      - "3306"
    ports:
      - "${MYSQL_BIND_HOST:-127.0.0.1}:${DB_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
      - --max-connections=200
      - --innodb-buffer-pool-size=256M
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - vacc_network

  mailhog:
    image: mailhog/mailhog:latest
    container_name: vacc_mailhog
    restart: unless-stopped
    profiles: ["dev"]
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - vacc_network

  backend:
    build: 
      context: ./backend
      args:
        SPRING_PROFILES_ACTIVE: prod
    container_name: vacc_backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SERVER_PORT: 8080
      DB_URL: ${DB_URL:?DB_URL must be set}
      DB_USERNAME: ${DB_USERNAME:?DB_USERNAME must be set}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
      JWT_ISSUER: ${JWT_ISSUER:-vaccination-system}
      JWT_ACCESS_MINUTES: ${JWT_ACCESS_MINUTES:-15}
      JWT_REFRESH_DAYS: ${JWT_REFRESH_DAYS:-7}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:?CORS_ALLOWED_ORIGINS must be set}
      APP_BASE_URL: ${APP_BASE_URL:?APP_BASE_URL must be set}
      FRONTEND_URL: ${FRONTEND_URL:?FRONTEND_URL must be set}
      MAIL_HOST: ${MAIL_HOST:?MAIL_HOST must be set}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_FROM: ${MAIL_FROM:?MAIL_FROM must be set}
      SMS_ENABLED: ${SMS_ENABLED:-false}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER:-}
      APP_SEED_ENABLED: ${APP_SEED_ENABLED:-false}
      JAVA_OPTS: ${JAVA_OPTS:--XX:InitialRAMPercentage=25 -XX:MaxRAMPercentage=75}
    depends_on:
      mysql:
        condition: service_healthy
    expose:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - vacc_network

  frontend:
    build: ./frontend
    container_name: vacc_frontend
    restart: unless-stopped
    expose:
      - "80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - vacc_network

  nginx:
    image: nginx:1.27-alpine
    container_name: vacc_nginx
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - vacc_network

networks:
  vacc_network:
    driver: bridge

volumes:
  mysql_data:


