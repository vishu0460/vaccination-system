spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 20000
      idle-timeout: 300000
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    baseline-on-migrate: false
    locations: classpath:db/migration
  sql:
    init:
      mode: never
  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: UTC

server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5174,http://localhost:5173,http://localhost:3000}
  mail:
    from: ${MAIL_FROM:noreply@example.invalid}
    base-url: ${APP_BASE_URL:http://localhost:5174}
  dev:
    auto-verify-email: false
  seed:
    enabled: ${APP_SEED_ENABLED:false}

logging:
  level:
    root: INFO
    com.vaccine: DEBUG
    com.vaccine.security: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

security:
  jwt:
    secret: ${JWT_SECRET}
    issuer: vaccination-system
    access-token-minutes: 15
    refresh-token-days: 7

  rate-limit:
    requests-per-minute: 60

  brute-force:
    max-attempts: 5
    lock-minutes: 15

