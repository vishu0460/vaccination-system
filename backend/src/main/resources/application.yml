spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  config:
    import: optional:file:../.env[.properties],optional:file:.env[.properties]

  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: UTC

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: 8080
  error:
    include-message: always
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4173,http://localhost:5173,http://localhost:5174,http://localhost:3000}
  mail:
    from: ${MAIL_FROM:noreply@example.invalid}
    base-url: ${APP_BASE_URL:http://localhost:5174}
  dev:
    auto-verify-email: ${DEV_AUTO_VERIFY_EMAIL:false}
  seed:
    enabled: ${APP_SEED_ENABLED:false}
  notifications:
    max-retries: ${NOTIFICATION_MAX_RETRIES:5}
    dispatch-batch-size: ${NOTIFICATION_DISPATCH_BATCH_SIZE:100}
    reconcile-window-days: ${NOTIFICATION_RECONCILE_WINDOW_DAYS:45}
    dispatch-fixed-delay-ms: ${NOTIFICATION_DISPATCH_DELAY_MS:60000}
    dispatch-initial-delay-ms: ${NOTIFICATION_DISPATCH_INITIAL_DELAY_MS:15000}
    reconcile-fixed-delay-ms: ${NOTIFICATION_RECONCILE_DELAY_MS:900000}
    reconcile-initial-delay-ms: ${NOTIFICATION_RECONCILE_INITIAL_DELAY_MS:30000}
  
  # SMS Configuration (Twilio)
  sms:
    enabled: ${SMS_ENABLED:false}
    twilio:
      account-sid: ${TWILIO_ACCOUNT_SID:}
      auth-token: ${TWILIO_AUTH_TOKEN:}
      phone-number: ${TWILIO_PHONE_NUMBER:}

logging:
  level:
    root: INFO
    com.vaccine: INFO
    com.vaccine.security: INFO
    org.springframework.web: WARN
  file:
    name: ${LOG_FILE_PATH:../Logs/application.log}
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

security:
  jwt:
    secret: ${JWT_SECRET}
    issuer: ${JWT_ISSUER:vaccination-system}
    access-token-minutes: ${JWT_ACCESS_MINUTES:1440}
    refresh-token-days: ${JWT_REFRESH_DAYS:7}
    expiration: 86400000
    refresh-expiration: 604800000

  rate-limit:
    requests-per-minute: 60

  brute-force:
    max-attempts: 5
    lock-minutes: 15
  otp:
    expiry-minutes: ${OTP_EXPIRY_MINUTES:10}
    max-attempts: ${OTP_MAX_ATTEMPTS:5}
    block-minutes: ${OTP_BLOCK_MINUTES:15}
    max-requests-per-minute: ${OTP_MAX_REQUESTS_PER_MINUTE:3}

  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4173,http://localhost:5173,http://localhost:5174,http://localhost:3000}
