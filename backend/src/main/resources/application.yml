spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: UTC

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4173,http://localhost:5173,http://localhost:5174,http://localhost:3000}
  mail:
    from: ${MAIL_FROM:noreply@vaccination-system.com}
    base-url: ${APP_BASE_URL:http://localhost:5173}
  admin:
    email: ${DEFAULT_ADMIN_EMAIL:vaxzone.vaccine@gmail.com}
    password: ${DEFAULT_ADMIN_PASSWORD:Vaccine@#6030}
  dev:
    auto-verify-email: ${DEV_AUTO_VERIFY_EMAIL:true}
  seed:
    enabled: ${APP_SEED_ENABLED:false}
  notifications:
    max-retries: ${NOTIFICATION_MAX_RETRIES:5}
    dispatch-batch-size: ${NOTIFICATION_DISPATCH_BATCH_SIZE:100}
    reconcile-window-days: ${NOTIFICATION_RECONCILE_WINDOW_DAYS:45}
    dispatch-fixed-delay-ms: ${NOTIFICATION_DISPATCH_DELAY_MS:60000}
    dispatch-initial-delay-ms: ${NOTIFICATION_DISPATCH_INITIAL_DELAY_MS:15000}
    reconcile-fixed-delay-ms: ${NOTIFICATION_RECONCILE_DELAY_MS:900000}
    reconcile-initial-delay-ms: ${NOTIFICATION_RECONCILE_INITIAL_DELAY_MS:30000}
  
  # SMS Configuration (Twilio)
  sms:
    enabled: ${SMS_ENABLED:false}
    twilio:
      account-sid: ${TWILIO_ACCOUNT_SID:}
      auth-token: ${TWILIO_AUTH_TOKEN:}
      phone-number: ${TWILIO_PHONE_NUMBER:}

logging:
  level:
    root: INFO
    com.vaccine: DEBUG
    com.vaccine.security: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

security:
  jwt:
    secret: ${JWT_SECRET:vaxzone-secret-key-for-jwt-token-generation-2024}
    issuer: ${JWT_ISSUER:vaccination-system}
    access-token-minutes: ${JWT_ACCESS_MINUTES:1440}
    refresh-token-days: ${JWT_REFRESH_DAYS:7}
    expiration: 86400000
    refresh-expiration: 604800000

  rate-limit:
    requests-per-minute: 60

  brute-force:
    max-attempts: 5
    lock-minutes: 15

  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4173,http://localhost:5173,http://localhost:5174,http://localhost:3000}
