spring:
  lifecycle:
    timeout-per-shutdown-phase: 20s
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:vaccination_db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USER:appuser}
    password: ${DB_PASSWORD:apppass}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      pool-name: vacc-hikari
      maximum-pool-size: ${DB_POOL_MAX_SIZE:20}
      minimum-idle: ${DB_POOL_MIN_IDLE:5}
      connection-timeout: 30000
      validation-timeout: 5000
      idle-timeout: 600000
      max-lifetime: 1800000
      keepalive-time: 300000
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.MySQLDialect
        jdbc:
          time_zone: UTC
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
  flyway:
    enabled: true
    baseline-on-migrate: false
    locations: classpath:db/migration
  sql:
    init:
      mode: never
  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: UTC

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful
  forward-headers-strategy: framework
  servlet:
    context-path: /api
    encoding:
      charset: UTF-8
      enabled: true
      force: true
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain,text/css,text/javascript,application/javascript
  http2:
    enabled: true

security:
  jwt:
    issuer: ${JWT_ISSUER:vaccination-system}
    access-token-minutes: ${JWT_ACCESS_MINUTES:15}
    refresh-token-days: ${JWT_REFRESH_DAYS:7}
    secret: ${JWT_SECRET:change_this_to_strong_secret_key_min_32_chars}
  brute-force:
    max-attempts: ${BRUTE_FORCE_MAX_ATTEMPTS:5}
    lock-minutes: ${BRUTE_FORCE_LOCK_MINUTES:15}
  rate-limit:
    requests-per-minute: ${RATE_LIMIT_REQUESTS_PER_MINUTE:60}

app:
  seed:
    enabled: ${APP_SEED_ENABLED:false}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:https://yourdomain.com}
  frontend-url: ${FRONTEND_URL:https://yourdomain.com}
  mail:
    from: ${MAIL_FROM:noreply@yourdomain.com}
    base-url: ${APP_BASE_URL:https://yourdomain.com}
  admin:
    email: ${DEFAULT_ADMIN_EMAIL:vaxzone.vaccine@gmail.com}
    password: ${DEFAULT_ADMIN_PASSWORD:ChangeThisImmediately!}
  dev:
    auto-verify-email: false
  
  # SMS Configuration (Twilio) - Production
  sms:
    enabled: ${SMS_ENABLED:false}
    twilio:
      account-sid: ${TWILIO_ACCOUNT_SID:}
      auth-token: ${TWILIO_AUTH_TOKEN:}
      phone-number: ${TWILIO_PHONE_NUMBER:}

management:
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    root: INFO
    com.vaccine: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} %-5level [%thread] %logger{36} - %msg%n"
  file:
    name: ${LOG_FILE_PATH:logs/application.log}
    max-size: 10MB
    max-history: 30
