spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:vaccination_db}?useSSL=true&requireSSL=true&serverTimezone=Asia/Kolkata
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          ssl:
            enable: true

server:
  port: ${SERVER_PORT:8080}
  ssl:
    enabled: true

logging:
  level:
    com.vaccine: INFO
    org.springframework.security: WARN

app:
  jwt:
    secret: ${JWT_SECRET}
  frontend-url: https://${DOMAIN_NAME}
  backend-url: https://${DOMAIN_NAME}
