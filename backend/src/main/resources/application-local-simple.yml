spring:
  profiles:
    active: local-simple
  datasource:
    url: ${LOCAL_DB_URL:jdbc:h2:file:./data/vaxdb;MODE=MySQL;DB_CLOSE_ON_EXIT=FALSE;INIT=RUNSCRIPT FROM 'classpath:repair-local-h2.sql'}
    username: ${LOCAL_DB_USERNAME:sa}
    password: ${LOCAL_DB_PASSWORD:}
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  sql:
    init:
      mode: never

app:
  seed:
    enabled: ${APP_SEED_ENABLED:false}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5174}
  dev:
    auto-verify-email: false

security:
  jwt:
    secret: ${JWT_SECRET}

logging:
  level:
    root: DEBUG
    com.vaccine: DEBUG
    org.springframework.security: DEBUG
