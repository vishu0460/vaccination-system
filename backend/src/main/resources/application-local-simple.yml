spring:
  profiles:
    active: local-simple
  datasource:
    url: jdbc:h2:mem:testdb
    username: sa
    password: ''
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
  sql:
    init:
      mode: always
      data-locations: classpath:data-fixed.sql

app:
  seed:
    enabled: true
  cors:
    allowed-origins: '*'
  dev:
    auto-verify-email: true

logging:
  level:
    root: DEBUG
    com.vaccine: DEBUG
    org.springframework.security: DEBUG
