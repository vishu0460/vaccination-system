spring:
  profiles:
    active: local-simple
  datasource:
    url: ${DB_URL:jdbc:h2:mem:testdb}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
  sql:
    init:
      mode: always
      data-locations: classpath:data-fixed.sql

app:
  seed:
    enabled: ${APP_SEED_ENABLED:false}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5174}
  dev:
    auto-verify-email: false

security:
  jwt:
    secret: ${JWT_SECRET}

logging:
  level:
    root: DEBUG
    com.vaccine: DEBUG
    org.springframework.security: DEBUG
