spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:vaccination_db}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USER:appuser}
    password: ${DB_PASSWORD:apppass456}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 20000
      idle-timeout: 300000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    baseline-on-migrate: false
    locations: classpath:db/migration

  sql:
    init:
      mode: never

server:
  servlet:
    context-path: /api

security:
  jwt:
    issuer: vaccination-system
    access-token-minutes: 15
    refresh-token-days: 7
    secret: ${JWT_SECRET:vaxzone-super-secret-jwt-key-64-chars-minimum-for-security-2024-local-dev}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:5175,http://localhost:3000,http://localhost,http://frontend:80,http://frontend}
  admin:
    email: ${DEFAULT_ADMIN_EMAIL:vaxzone.vaccine@gmail.com}
    password: ${DEFAULT_ADMIN_PASSWORD:Vaccine@#6030}
  dev:
    auto-verify-email: true
  seed:
    enabled: ${APP_SEED_ENABLED:true}

logging:
  level:
    root: INFO
    com.vaccine: INFO
