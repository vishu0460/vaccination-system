spring:
  datasource:
    url: ${LOCAL_DB_URL:jdbc:h2:file:./data/vaxdb;MODE=MySQL;DB_CLOSE_ON_EXIT=FALSE;INIT=RUNSCRIPT FROM 'classpath:repair-local-h2.sql'}
    username: ${LOCAL_DB_USERNAME:sa}
    password: ${LOCAL_DB_PASSWORD:}
    driver-class-name: org.h2.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 20000
      idle-timeout: 300000

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.H2Dialect
        jdbc:
          time_zone: UTC

  flyway:
    enabled: false

  sql:
    init:
      mode: never

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api

security:
  jwt:
    issuer: vaccination-system
    access-token-minutes: 15
    refresh-token-days: 7
    secret: ${JWT_SECRET}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:5175,http://localhost:3000,http://localhost,http://127.0.0.1:4173,http://127.0.0.1:5173,http://127.0.0.1:5174,http://127.0.0.1:5175,http://127.0.0.1:3000,http://127.0.0.1,http://frontend:80,http://frontend}
  dev:
    auto-verify-email: false
    include-otp-in-messages: ${DEV_INCLUDE_OTP_IN_MESSAGES:false}
    disable-auth-for-profile: ${DEV_DISABLE_AUTH_FOR_PROFILE:true}
  seed:
    enabled: ${APP_SEED_ENABLED:false}

logging:
  level:
    root: INFO
    com.vaccine: INFO
    com.vaccine.security: DEBUG
    org.springframework.security: DEBUG
