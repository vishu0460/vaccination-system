server:
  port: ${SERVER_PORT:8080}

spring:
  datasource:
    url: jdbc:h2:mem:vaxdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: 
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    open-in-view: false
    defer-datasource-initialization: false
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: false
  sql:
    init:
      mode: never
  mail:
    host: ${MAIL_HOST:mailhog}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

management:
  health:
    mail:
      enabled: false
  endpoints:
    web:
      exposure:
        include: health,info

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4173,http://localhost:5173,http://localhost:5174,http://localhost:5175,http://localhost:3000,http://localhost,http://frontend:80,http://frontend}
  admin:
    email: ${DEFAULT_ADMIN_EMAIL:vaxzone.vaccine@gmail.com}
    password: ${DEFAULT_ADMIN_PASSWORD:Vaccine@#6030}
  dev:
    auto-verify-email: ${DEV_AUTO_VERIFY_EMAIL:true}
  mail:
    from: ${MAIL_FROM:noreply@vaccination.local}
  seed:
    enabled: ${APP_SEED_ENABLED:true}
