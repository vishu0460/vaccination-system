spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
    username: sa
    password: ''
    driver-class-name: org.h2.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false
  sql:
    init:
      mode: never

server:
  servlet:
    context-path: /api

security:
  jwt:
    issuer: test-issuer
    access-token-minutes: 15
    refresh-token-days: 7
    secret: TestSecretKeyForJWTTokenGenerationAtLeast32Bytes!
    expiration: 900000
    refresh-expiration: 604800000
  rate-limit:
    requests-per-minute: 60
  brute-force:
    max-attempts: 5
    lock-minutes: 15

app:
  seed:
    enabled: true
  cors:
    allowed-origins:
      - http://localhost:5173
  admin:
    email: admin@test.com
    password: Test@123
  mail:
    from: noreply@test.com
    base-url: http://localhost:5173
  dev:
    auto-verify-email: true
